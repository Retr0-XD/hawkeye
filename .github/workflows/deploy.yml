# Hawkeye — auto-deploy to Cloud Run on push to main.
#
# Each service is built remotely by Cloud Build (no Docker needed in CI) and
# rolled out to Cloud Run. Secrets are NEVER committed; the GCP credentials
# live in the GitHub repo secret GCP_SA_KEY (a service-account JSON key with
# Cloud Build + Cloud Run + Artifact Registry + Service Account User roles).
#
# Required GitHub Secrets:
#   GCP_SA_KEY        - JSON key for a deploy service account
#   HAWKEYE_CREDS_KEY - Fernet key used to encrypt per-user GCP credentials
#                       (same value set on the running API service)
#   VITE_GOOGLE_CLIENT_ID    - OAuth Web client ID for frontend-user
#   VITE_GOOGLE_CLIENT_SECRET- OAuth Web client secret for frontend-user
#   VITE_API_BASE           - https://hawkeye-api-78803747777.us-central1.run.app

name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: dice-master-the-platform
  REGION: us-central1
  REPO: hawkeye
  IMAGE: us-central1-docker.pkg.dev/dice-master-the-platform/hawkeye

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # --- Build + deploy each service via Cloud Build ---
      - name: Deploy api
        run: |
          gcloud builds submit --region=$REGION --project=$PROJECT_ID \
            --tag=$IMAGE/api:latest services/api
          gcloud run services update hawkeye-api --region=$REGION --project=$PROJECT_ID \
            --image=$IMAGE/api:latest \
            --set-env-vars="HAWKEYE_OAUTH_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }},HAWKEYE_ALLOWED_EMAILS=,HAWKEYE_CREDS_KEY=${{ secrets.HAWKEYE_CREDS_KEY }}"

      - name: Deploy frontend-user
        run: |
          gcloud builds submit --region=$REGION --project=$PROJECT_ID \
            --tag=$IMAGE/frontend-user:latest services/frontend-user \
            --build-env-vars="^@^VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }},VITE_GOOGLE_CLIENT_SECRET=${{ secrets.VITE_GOOGLE_CLIENT_SECRET }},VITE_API_BASE=${{ secrets.VITE_API_BASE }}"
          gcloud run services update hawkeye-frontend-user --region=$REGION --project=$PROJECT_ID \
            --image=$IMAGE/frontend-user:latest

      - name: Deploy frontend-demo
        run: |
          gcloud builds submit --region=$REGION --project=$PROJECT_ID \
            --tag=$IMAGE/frontend-demo:latest services/frontend-demo \
            --build-env-vars="^@^VITE_DEMO_STUB=1,VITE_API_BASE=${{ secrets.VITE_API_BASE }}"
          gcloud run services update hawkeye-frontend-demo --region=$REGION --project=$PROJECT_ID \
            --image=$IMAGE/frontend-demo:latest

      - name: Deploy ml
        run: |
          gcloud builds submit --region=$REGION --project=$PROJECT_ID \
            --tag=$IMAGE/ml:latest services/ml
          gcloud run services update hawkeye-ml --region=$REGION --project=$PROJECT_ID \
            --image=$IMAGE/ml:latest

      - name: Deploy processing
        run: |
          gcloud builds submit --region=$REGION --project=$PROJECT_ID \
            --tag=$IMAGE/processing:latest services/processing
          gcloud run services update hawkeye-processing --region=$REGION --project=$PROJECT_ID \
            --image=$IMAGE/processing:latest

      - name: Deploy ingestion
        run: |
          gcloud builds submit --region=$REGION --project=$PROJECT_ID \
            --tag=$IMAGE/ingestion:latest services/ingestion
          gcloud run services update hawkeye-ingestion --region=$REGION --project=$PROJECT_ID \
            --image=$IMAGE/ingestion:latest

      - name: Deploy automation
        run: |
          gcloud builds submit --region=$REGION --project=$PROJECT_ID \
            --tag=$IMAGE/automation:latest services/automation
          gcloud run services update hawkeye-automation --region=$REGION --project=$PROJECT_ID \
            --image=$IMAGE/automation:latest

      - name: Deploy budget-guard
        run: |
          gcloud builds submit --region=$REGION --project=$PROJECT_ID \
            --tag=$IMAGE/budget-guard:latest services/budget-guard
          gcloud run services update hawkeye-budget-guard --region=$REGION --project=$PROJECT_ID \
            --image=$IMAGE/budget-guard:latest
