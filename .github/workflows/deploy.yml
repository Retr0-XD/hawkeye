# Hawkeye — auto-deploy to Cloud Run on push to main.
#
# Each service is built remotely by Cloud Build (no Docker needed in CI) and
# rolled out to Cloud Run. Authentication uses Workload Identity Federation
# (OIDC) — NO service-account JSON key is used, which satisfies the
# iam.disableServiceAccountKeyCreation org policy. The deploy service account
# is impersonated via the WIF pool, so no long-lived key ever exists.
#
# Required GitHub Secrets / Variables:
#   GCP_WIF_PROJECT_NUMBER - numeric project number of dice-master-the-platform
#   GCP_WIF_POOL          - Workload Identity Pool id (e.g. github-pool)
#   GCP_WIF_PROVIDER      - WIF provider id (e.g. github-provider)
#   GCP_SERVICE_ACCOUNT   - deploy SA email (e.g. github-deployer@...)
#   HAWKEYE_CREDS_KEY     - Fernet key (same value set on the running API)
#   VITE_GOOGLE_CLIENT_ID    - OAuth Web client ID for frontend-user
#   VITE_GOOGLE_CLIENT_SECRET- OAuth Web client secret for frontend-user
#   VITE_API_BASE           - https://hawkeye-api-78803747777.us-central1.run.app
#
# One-time setup (no keys created):
#   gcloud iam workload-identity-pools create github-pool --project=... --location=global
#   gcloud iam workload-identity-pools providers create-oidc github-provider \
#     --project=... --location=global --workload-identity-pool=github-pool \
#     --issuer-uri=https://token.actions.githubusercontent.com \
#     --attribute-mapping="google.subject=assertion.sub,attribute.repository=assertion.repository"
#   gcloud iam service-accounts add-iam-policy-binding github-deployer@... \
#     --role=roles/iam.workloadIdentityUser \
#     --member="principalSet://iam.googleapis.com/projects/<NUM>/locations/global/workloadIdentityPools/github-pool/attribute.repository/Retr0-XD/hawkeye"
#
# NOTE: builds are submitted with --async and their status is polled via
# `gcloud builds describe` (which does NOT stream logs). This avoids the
# "could not stream logs" failure that occurs under VPC-SC even though the
# build itself succeeds.

name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for OIDC / WIF

env:
  PROJECT_ID: dice-master-the-platform
  REGION: us-central1
  REPO: hawkeye
  IMAGE: us-central1-docker.pkg.dev/dice-master-the-platform/hawkeye

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: projects/${{ secrets.GCP_WIF_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.GCP_WIF_POOL }}/providers/${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Helper: submit a Cloud Build asynchronously and poll its status
      # (without streaming logs, which fails under VPC-SC).
      - name: Deploy api
        run: |
          submit_build () {
            local svc="$1"; local src="$2"; local extra="$3"
            local id
            id=$(gcloud builds submit --async --region=$REGION --project=$PROJECT_ID \
                  --tag=$IMAGE/$svc:latest "$src" $extra --format="value(id)")
            echo "build $id for $svc"
            local status=""
            for i in $(seq 1 90); do
              status=$(gcloud builds describe "$id" --region=$REGION --project=$PROJECT_ID --format="value(status)" 2>/dev/null)
              if [ "$status" = "SUCCESS" ] || [ "$status" = "FAILURE" ] || [ "$status" = "TIMEOUT" ] || [ "$status" = "CANCELLED" ]; then break; fi
              sleep 5
            done
            if [ "$status" != "SUCCESS" ]; then echo "BUILD FAILED ($svc): $status"; exit 1; fi
          }
          submit_build api "${{ github.workspace }}/hawkeye/services/api"
          gcloud run services update hawkeye-api --region=$REGION --project=$PROJECT_ID \
            --image=$IMAGE/api:latest \
            --set-env-vars="HAWKEYE_OAUTH_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }},HAWKEYE_ALLOWED_EMAILS=,HAWKEYE_CREDS_KEY=${{ secrets.HAWKEYE_CREDS_KEY }}"

      - name: Deploy frontend-user
        run: |
          submit_build () {
            local svc="$1"; local src="$2"; local extra="$3"
            local id
            if [[ "$extra" == *"--config"* ]]; then
              id=$(gcloud builds submit --async --region=$REGION --project=$PROJECT_ID \
                    "$src" $extra --format="value(id)")
            else
              id=$(gcloud builds submit --async --region=$REGION --project=$PROJECT_ID \
                    --tag=$IMAGE/$svc:latest "$src" $extra --format="value(id)")
            fi
            echo "build $id for $svc"
            local status=""
            for i in $(seq 1 90); do
              status=$(gcloud builds describe "$id" --region=$REGION --project=$PROJECT_ID --format="value(status)" 2>/dev/null)
              if [ "$status" = "SUCCESS" ] || [ "$status" = "FAILURE" ] || [ "$status" = "TIMEOUT" ] || [ "$status" = "CANCELLED" ]; then break; fi
              sleep 5
            done
            if [ "$status" != "SUCCESS" ]; then echo "BUILD FAILED ($svc): $status"; exit 1; fi
          }
          submit_build frontend-user "${{ github.workspace }}/hawkeye/services/frontend-user" \
            "--config=cloudbuild.yaml --substitutions=_VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }},_VITE_GOOGLE_CLIENT_SECRET=${{ secrets.VITE_GOOGLE_CLIENT_SECRET }},_VITE_API_BASE=${{ secrets.VITE_API_BASE }}"
          gcloud run services update hawkeye-frontend-user --region=$REGION --project=$PROJECT_ID \
            --image=$IMAGE/frontend-user:latest

      - name: Deploy frontend-demo
        run: |
          submit_build () {
            local svc="$1"; local src="$2"; local extra="$3"
            local id
            if [[ "$extra" == *"--config"* ]]; then
              id=$(gcloud builds submit --async --region=$REGION --project=$PROJECT_ID \
                    "$src" $extra --format="value(id)")
            else
              id=$(gcloud builds submit --async --region=$REGION --project=$PROJECT_ID \
                    --tag=$IMAGE/$svc:latest "$src" $extra --format="value(id)")
            fi
            echo "build $id for $svc"
            local status=""
            for i in $(seq 1 90); do
              status=$(gcloud builds describe "$id" --region=$REGION --project=$PROJECT_ID --format="value(status)" 2>/dev/null)
              if [ "$status" = "SUCCESS" ] || [ "$status" = "FAILURE" ] || [ "$status" = "TIMEOUT" ] || [ "$status" = "CANCELLED" ]; then break; fi
              sleep 5
            done
            if [ "$status" != "SUCCESS" ]; then echo "BUILD FAILED ($svc): $status"; exit 1; fi
          }
          submit_build frontend-demo "${{ github.workspace }}/hawkeye/services/frontend-demo" \
            "--config=cloudbuild.yaml --substitutions=_VITE_DEMO_STUB=1,_VITE_API_BASE=${{ secrets.VITE_API_BASE }}"
          gcloud run services update hawkeye-frontend-demo --region=$REGION --project=$PROJECT_ID \
            --image=$IMAGE/frontend-demo:latest

      - name: Deploy ml
        run: |
          submit_build () {
            local svc="$1"; local src="$2"; local extra="$3"
            local id
            id=$(gcloud builds submit --async --region=$REGION --project=$PROJECT_ID \
                  --tag=$IMAGE/$svc:latest "$src" $extra --format="value(id)")
            echo "build $id for $svc"
            local status=""
            for i in $(seq 1 90); do
              status=$(gcloud builds describe "$id" --region=$REGION --project=$PROJECT_ID --format="value(status)" 2>/dev/null)
              if [ "$status" = "SUCCESS" ] || [ "$status" = "FAILURE" ] || [ "$status" = "TIMEOUT" ] || [ "$status" = "CANCELLED" ]; then break; fi
              sleep 5
            done
            if [ "$status" != "SUCCESS" ]; then echo "BUILD FAILED ($svc): $status"; exit 1; fi
          }
          submit_build ml "${{ github.workspace }}/hawkeye/services/ml"
          gcloud run services update hawkeye-ml --region=$REGION --project=$PROJECT_ID \
            --image=$IMAGE/ml:latest

      - name: Deploy processing
        run: |
          submit_build () {
            local svc="$1"; local src="$2"; local extra="$3"
            local id
            id=$(gcloud builds submit --async --region=$REGION --project=$PROJECT_ID \
                  --tag=$IMAGE/$svc:latest "$src" $extra --format="value(id)")
            echo "build $id for $svc"
            local status=""
            for i in $(seq 1 90); do
              status=$(gcloud builds describe "$id" --region=$REGION --project=$PROJECT_ID --format="value(status)" 2>/dev/null)
              if [ "$status" = "SUCCESS" ] || [ "$status" = "FAILURE" ] || [ "$status" = "TIMEOUT" ] || [ "$status" = "CANCELLED" ]; then break; fi
              sleep 5
            done
            if [ "$status" != "SUCCESS" ]; then echo "BUILD FAILED ($svc): $status"; exit 1; fi
          }
          submit_build processing "${{ github.workspace }}/hawkeye/services/processing"
          gcloud run services update hawkeye-processing --region=$REGION --project=$PROJECT_ID \
            --image=$IMAGE/processing:latest

      - name: Deploy ingestion
        run: |
          submit_build () {
            local svc="$1"; local src="$2"; local extra="$3"
            local id
            id=$(gcloud builds submit --async --region=$REGION --project=$PROJECT_ID \
                  --tag=$IMAGE/$svc:latest "$src" $extra --format="value(id)")
            echo "build $id for $svc"
            local status=""
            for i in $(seq 1 90); do
              status=$(gcloud builds describe "$id" --region=$REGION --project=$PROJECT_ID --format="value(status)" 2>/dev/null)
              if [ "$status" = "SUCCESS" ] || [ "$status" = "FAILURE" ] || [ "$status" = "TIMEOUT" ] || [ "$status" = "CANCELLED" ]; then break; fi
              sleep 5
            done
            if [ "$status" != "SUCCESS" ]; then echo "BUILD FAILED ($svc): $status"; exit 1; fi
          }
          submit_build ingestion "${{ github.workspace }}/hawkeye/services/ingestion"
          gcloud run services update hawkeye-ingestion --region=$REGION --project=$PROJECT_ID \
            --image=$IMAGE/ingestion:latest

      - name: Deploy automation
        run: |
          submit_build () {
            local svc="$1"; local src="$2"; local extra="$3"
            local id
            id=$(gcloud builds submit --async --region=$REGION --project=$PROJECT_ID \
                  --tag=$IMAGE/$svc:latest "$src" $extra --format="value(id)")
            echo "build $id for $svc"
            local status=""
            for i in $(seq 1 90); do
              status=$(gcloud builds describe "$id" --region=$REGION --project=$PROJECT_ID --format="value(status)" 2>/dev/null)
              if [ "$status" = "SUCCESS" ] || [ "$status" = "FAILURE" ] || [ "$status" = "TIMEOUT" ] || [ "$status" = "CANCELLED" ]; then break; fi
              sleep 5
            done
            if [ "$status" != "SUCCESS" ]; then echo "BUILD FAILED ($svc): $status"; exit 1; fi
          }
          submit_build automation "${{ github.workspace }}/hawkeye/services/automation"
          gcloud run services update hawkeye-automation --region=$REGION --project=$PROJECT_ID \
            --image=$IMAGE/automation:latest

      - name: Deploy budget-guard
        run: |
          submit_build () {
            local svc="$1"; local src="$2"; local extra="$3"
            local id
            id=$(gcloud builds submit --async --region=$REGION --project=$PROJECT_ID \
                  --tag=$IMAGE/$svc:latest "$src" $extra --format="value(id)")
            echo "build $id for $svc"
            local status=""
            for i in $(seq 1 90); do
